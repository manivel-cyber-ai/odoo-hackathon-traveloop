<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveloop – Smart Travel Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      color: #1a1a1a;
    }

    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --accent: #f093fb;
      --success: #4ade80;
      --bg: #f8f9fc;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --shadow-lg: 0 12px 24px rgba(0,0,0,0.15);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 20px;
      background: var(--bg);
    }

    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    .sidebar {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      height: fit-content;
      position: sticky;
      top: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 32px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-menu {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      font-weight: 500;
      font-size: 15px;
    }

    .nav-link:hover {
      background: var(--bg);
      border-color: var(--border);
      transform: translateX(4px);
    }

    .nav-link.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: var(--shadow-lg);
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .card.highlight { border: 2px solid var(--primary); background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05)); }

    h1 { font-size: 32px; font-weight: 800; margin: 0 0 12px 0; }
    h2 { font-size: 24px; font-weight: 700; margin: 0 0 12px 0; }
    h3 { font-size: 20px; font-weight: 700; margin: 0 0 12px 0; }
    h4 { font-size: 18px; font-weight: 700; margin: 0 0 8px 0; }
    p { margin: 0 0 12px 0; color: var(--muted); line-height: 1.6; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--primary);
      border: 2px solid var(--border);
    }

    .btn-secondary:hover { background: var(--border); }

    .grid {
      display: grid;
      gap: 20px;
    }

    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }

    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    .stat-card {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }

    .stat-card:hover { transform: translateY(-8px); }

    .stat-number {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 8px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }

    .city-card {
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .city-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

    .city-image {
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: var(--bg);
    }

    .city-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .city-info {
      padding: 16px;
    }

    .city-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .city-country { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
    .city-meta { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; padding-top: 12px; border-top: 1px solid var(--border); }

    .trip-card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .trip-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

    .trip-header {
      padding: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .trip-name { font-size: 20px; font-weight: 700; margin: 0 0 4px 0; }
    .trip-dates { font-size: 14px; opacity: 0.9; margin: 0; }

    .trip-body {
      padding: 20px;
    }

    .trip-description { font-size: 14px; color: var(--muted); margin: 0 0 16px 0; }

    .trip-budget {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .budget-label { color: var(--muted); font-size: 14px; }
    .budget-amount { font-size: 20px; font-weight: 700; color: var(--primary); }

    .post-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .post-card:hover { box-shadow: var(--shadow-lg); }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .post-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .post-author { font-weight: 600; margin: 0 0 2px 0; }
    .post-time { font-size: 13px; color: var(--muted); margin: 0; }

    .post-title { font-size: 18px; font-weight: 700; margin: 0 0 8px 0; }
    .post-text { font-size: 14px; line-height: 1.6; margin: 0 0 16px 0; }

    .post-actions {
      display: flex;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .post-action {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .post-action:hover { color: var(--primary); }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      z-index: 1000;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 8px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      padding: 12px;
      text-align: left;
      background: var(--bg);
      font-weight: 600;
      border-bottom: 2px solid var(--border);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    tr:hover { background: var(--bg); }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .mt-4 { margin-top: 16px; }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }

    @media (max-width: 768px) {
      .layout { padding: 12px; }
      .sidebar { padding: 20px; }
      .card { padding: 20px; }
      h1 { font-size: 24px; }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      border-left: 4px solid var(--primary);
      z-index: 1100;
      animation: slideInRight 0.3s ease-out;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(400px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .toast.error { border-left-color: #ff6b6b; }
    .toast.success { border-left-color: var(--success); }

    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">✈️ Traveloop</div>
      <nav class="nav-menu">
        <li><a class="nav-link active" onclick="app.route('/')">🏠 Home</a></li>
        <li><a class="nav-link" onclick="app.route('/trips')">🗺️ Trips</a></li>
        <li><a class="nav-link" onclick="app.route('/cities')">🌍 Cities</a></li>
        <li><a class="nav-link" onclick="app.route('/community')">💬 Community</a></li>
        <li><a class="nav-link" onclick="app.route('/profile')">👤 Profile</a></li>
        <li id="admin-nav" class="hidden"><a class="nav-link" onclick="app.route('/admin')">⚙️ Admin</a></li>
      </nav>
      <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);">
        <button class="btn btn-secondary" style="width: 100%;" onclick="app.logout()">🚪 Logout</button>
      </div>
    </aside>

    <main class="main" id="content"></main>
  </div>

  <script>
    class App {
      constructor() {
        this.currentUser = null;
        this.trips = [];
        this.cities = [];
        this.init();
      }

      async init() {
        const userStr = localStorage.getItem('currentUser');
        if (userStr) {
          this.currentUser = JSON.parse(userStr);
          this.loadData();
        } else {
          this.route('/login');
        }
      }

      async loadData() {
        try {
          const res = await fetch('/api/auth/me');
          if (!res.ok) throw new Error('Not authenticated');
          this.currentUser = await res.json();
          localStorage.setItem('currentUser', JSON.stringify(this.currentUser));
          
          const tripsRes = await fetch('/api/trips');
          this.trips = await tripsRes.json();
          
          const citiesRes = await fetch('/api/cities');
          this.cities = await citiesRes.json();
          
          this.render();
        } catch {
          this.route('/login');
        }
      }

      route(path) {
        this.currentRoute = path;
        this.render();
      }

      render() {
        if (!this.currentUser && this.currentRoute !== '/login' && this.currentRoute !== '/register') {
          this.route('/login');
          return;
        }

        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));

        if (this.currentRoute === '/') this.renderHome();
        else if (this.currentRoute === '/login') this.renderLogin();
        else if (this.currentRoute === '/register') this.renderRegister();
        else if (this.currentRoute === '/trips') this.renderTrips();
        else if (this.currentRoute === '/cities') this.renderCities();
        else if (this.currentRoute === '/community') this.renderCommunity();
        else if (this.currentRoute === '/profile') this.renderProfile();
        else if (this.currentRoute === '/admin') this.currentUser?.isAdmin ? this.renderAdmin() : this.route('/');

        document.getElementById('admin-nav').classList.toggle('hidden', !this.currentUser?.isAdmin);
      }

      renderHome() {
        const html = `
          <div class="card highlight">
            <h1>Welcome, ${this.currentUser?.name}! ✈️</h1>
            <p>Plan your adventures, track budgets, and share experiences with Traveloop</p>
          </div>

          <div class="grid grid-3">
            <div class="stat-card">
              <div class="stat-number">${this.trips.length}</div>
              <div class="stat-label">Planned Trips</div>
              <button class="btn btn-secondary" style="width: 100%; margin-top: 16px;" onclick="app.route('/trips')">View All</button>
            </div>
            <div class="stat-card">
              <div class="stat-number">${this.cities.length}</div>
              <div class="stat-label">Cities Explored</div>
              <button class="btn btn-secondary" style="width: 100%; margin-top: 16px;" onclick="app.route('/cities')">Explore</button>
            </div>
            <div class="stat-card">
              <div class="stat-number">15+</div>
              <div class="stat-label">Community Posts</div>
              <button class="btn btn-secondary" style="width: 100%; margin-top: 16px;" onclick="app.route('/community')">Read</button>
            </div>
          </div>

          <div class="card">
            <h2>Quick Actions</h2>
            <div class="btn-group">
              <button class="btn btn-primary">➕ Plan New Trip</button>
              <button class="btn btn-secondary" onclick="app.route('/cities')">🔍 Discover Cities</button>
              <button class="btn btn-secondary" onclick="app.route('/community')">💭 Share Experience</button>
            </div>
          </div>

          ${this.trips.length > 0 ? `
            <div class="card">
              <h2>Recent Trips</h2>
              <div class="grid grid-3">
                ${this.trips.slice(0, 3).map(trip => `
                  <div class="trip-card">
                    <div class="trip-header">
                      <div class="trip-name">${trip.name}</div>
                      <div class="trip-dates">${trip.start_date} → ${trip.end_date}</div>
                    </div>
                    <div class="trip-body">
                      <p class="trip-description">${trip.description}</p>
                      <div class="trip-budget">
                        <span class="budget-label">Budget</span>
                        <span class="budget-amount">$${trip.budget}</span>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
        `;
        document.getElementById('content').innerHTML = html;
      }

      renderLogin() {
        const html = `
          <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
            <div class="card" style="max-width: 500px; width: 100%;">
              <h1 style="text-align: center; margin-bottom: 8px;">✈️ Traveloop</h1>
              <p style="text-align: center; margin-bottom: 32px;">Smart travel planning for modern travelers</p>
              
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="login-email" placeholder="admin@traveloop.io" value="admin@traveloop.io">
              </div>

              <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" value="Admin@12345">
              </div>

              <button class="btn btn-primary" style="width: 100%; margin-bottom: 16px; padding: 14px;" onclick="app.login()">Sign In</button>

              <p style="text-align: center; margin-bottom: 16px;">Don't have account? <a href="#" onclick="app.route('/register'); return false;" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create one</a></p>

              <div style="background: var(--bg); padding: 16px; border-radius: 12px; font-size: 13px; color: var(--muted);">
                <strong style="color: var(--text);">Demo Credentials:</strong><br>
                👑 Admin: admin@traveloop.io / Admin@12345<br>
                👤 User: ava@traveloop.io / Demo@12345
              </div>
            </div>
          </div>
        `;
        document.getElementById('content').innerHTML = html;
      }

      renderRegister() {
        const html = `
          <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
            <div class="card" style="max-width: 500px; width: 100%;">
              <h1 style="text-align: center; margin-bottom: 32px;">Create Account</h1>
              
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe">
              </div>

              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="reg-email" placeholder="john@example.com">
              </div>

              <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="reg-password" placeholder="Min 8 characters">
              </div>

              <button class="btn btn-primary" style="width: 100%; margin-bottom: 16px; padding: 14px;" onclick="app.register()">Create Account</button>

              <p style="text-align: center;">Have account? <a href="#" onclick="app.route('/login'); return false;" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a></p>
            </div>
          </div>
        `;
        document.getElementById('content').innerHTML = html;
      }

      renderTrips() {
        const html = `
          <div class="card">
            <h1>My Trips 🗺️</h1>
            <p>Plan and manage all your travel adventures</p>
            <button class="btn btn-primary" style="margin-top: 16px;" onclick="alert('Create trip feature coming soon!')">➕ Plan New Trip</button>
          </div>

          ${this.trips.length > 0 ? `
            <div class="grid grid-2">
              ${this.trips.map(trip => `
                <div class="trip-card">
                  <div class="trip-header">
                    <div class="trip-name">${trip.name}</div>
                    <div class="trip-dates">${trip.start_date} → ${trip.end_date}</div>
                  </div>
                  <div class="trip-body">
                    <p class="trip-description">${trip.description}</p>
                    <div class="trip-budget">
                      <span class="budget-label">Budget</span>
                      <span class="budget-amount">$${trip.budget}</span>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          ` : `
            <div class="card text-center">
              <p style="font-size: 40px; margin: 32px 0;">🗺️</p>
              <h3>No trips planned yet</h3>
              <p>Start your travel planning journey today!</p>
              <button class="btn btn-primary" onclick="alert('Create trip feature coming soon!')">Create First Trip</button>
            </div>
          `}
        `;
        document.getElementById('content').innerHTML = html;
      }

      renderCities() {
        const html = `
          <div class="card">
            <h1>Explore ${this.cities.length}+ Cities 🌍</h1>
            <p>Discover destinations worldwide with interactive map and travel info</p>
            <input type="text" id="city-search" placeholder="🔍 Search cities..." style="margin-top: 16px;" onkeyup="app.filterCities()">
          </div>

          <div class="card">
            <h2>📍 Interactive City Map</h2>
            <div id="city-map" style="height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border);"></div>
          </div>

          <div class="card">
            <h2>🏙️ Cities Directory (${this.cities.length})</h2>
            <p style="color: var(--muted);">Click any city to view photos and details</p>
          </div>

          <div class="image-grid" id="city-grid">
            ${this.cities.slice(0, 60).map(city => `
              <div class="city-card" onclick="app.showCityDetails('${city.name}', '${city.country}', ${city.latitude}, ${city.longitude}, ${city.cost_index}, ${city.popularity})">
                <div class="city-image">
                  <img src="${city.image}" alt="${city.name}" style="transition: transform 0.3s ease; cursor: pointer;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onerror="this.src='/api/image/placeholder/${city.name}'">
                </div>
                <div class="city-info">
                  <div class="city-name">${city.name}</div>
                  <div class="city-country">${city.country}</div>
                  <div class="city-meta">
                    <span>💵 $${city.cost_index}/day</span>
                    <span>⭐ ${city.popularity}%</span>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        document.getElementById('content').innerHTML = html;
        
        // Initialize map after DOM is ready
        setTimeout(() => {
          this.initializeCityMap();
        }, 100);
      }

      initializeCityMap() {
        const mapElement = document.getElementById('city-map');
        if (!mapElement || mapElement._leaflet_map) return;

        const map = L.map('city-map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors',
          maxZoom: 19
        }).addTo(map);

        // Add markers for all cities
        this.cities.forEach(city => {
          if (city.latitude && city.longitude) {
            const marker = L.circleMarker([city.latitude, city.longitude], {
              radius: 6,
              fillColor: '#667eea',
              color: 'white',
              weight: 2,
              opacity: 0.8,
              fillOpacity: 0.7
            }).bindPopup(`<strong>${city.name}</strong><br>${city.country}<br>$${city.cost_index}/day`);
            
            marker.on('click', () => {
              this.showCityDetails(city.name, city.country, city.latitude, city.longitude, city.cost_index, city.popularity);
              map.setView([city.latitude, city.longitude], 10);
            });
            
            marker.addTo(map);
          }
        });
      }

      showCityDetails(name, country, lat, lon, cost, popularity) {
        const html = `
          <div class="card" style="max-width: 100%; cursor: pointer;" onclick="app.route('/cities')">
            <button class="btn btn-secondary" style="margin-bottom: 16px;">← Back to Cities</button>
          </div>

          <div class="card">
            <div style="position: relative; height: 400px; border-radius: 12px; overflow: hidden; margin-bottom: 20px;">
              <img src="/api/image/placeholder/${name}" alt="${name}" style="width: 100%; height: 100%; object-fit: cover;">
              <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.7)); padding: 24px; color: white;">
                <h1 style="margin: 0; color: white;">${name}</h1>
                <p style="margin: 8px 0 0 0; color: rgba(255,255,255,0.9);">📍 ${country}</p>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
              <div style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1)); padding: 16px; border-radius: 12px; border: 1px solid rgba(102, 126, 234, 0.2);">
                <p style="margin: 0; color: var(--muted); font-size: 12px;">DAILY COST</p>
                <h3 style="margin: 8px 0 0 0; color: var(--primary);">$${cost}/day</h3>
              </div>
              <div style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1)); padding: 16px; border-radius: 12px; border: 1px solid rgba(102, 126, 234, 0.2);">
                <p style="margin: 0; color: var(--muted); font-size: 12px;">POPULARITY</p>
                <h3 style="margin: 8px 0 0 0; color: var(--primary);">${popularity}% popular</h3>
              </div>
              <div style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1)); padding: 16px; border-radius: 12px; border: 1px solid rgba(102, 126, 234, 0.2);">
                <p style="margin: 0; color: var(--muted); font-size: 12px;">COORDINATES</p>
                <h3 style="margin: 8px 0 0 0; color: var(--primary);">${lat.toFixed(2)}°, ${lon.toFixed(2)}°</h3>
              </div>
            </div>

            <h2>About ${name}</h2>
            <p>Welcome to ${name}, ${country}! This amazing destination offers incredible experiences for travelers. With a daily cost of $${cost}, it's a great value destination. Join ${popularity}% of our community members who have visited this city!</p>

            <h3 style="margin-top: 24px;">Quick Facts</h3>
            <ul style="color: var(--muted); line-height: 1.8;">
              <li>💰 Budget: $${cost} per day average</li>
              <li>🌟 Popularity: ${popularity}% of travelers recommend</li>
              <li>🗺️ Location: ${lat.toFixed(2)}° N, ${lon.toFixed(2)}° E</li>
              <li>✈️ Perfect for: Culture, food, adventure, relaxation</li>
              <li>📸 Instagram-worthy: Yes!</li>
            </ul>

            <h3 style="margin-top: 24px;">Things to Do</h3>
            <div class="grid grid-2" style="gap: 12px;">
              <div style="background: var(--bg); padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary);">🏛️ Museums & Landmarks</div>
              <div style="background: var(--bg); padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary);">🍽️ Local Food Scene</div>
              <div style="background: var(--bg); padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary);">🏞️ Nature & Outdoor</div>
              <div style="background: var(--bg); padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary);">🎭 Entertainment</div>
            </div>

            <button class="btn btn-primary" style="margin-top: 24px; width: 100%;" onclick="alert('Add this city to a trip soon!')">➕ Add to Trip</button>
          </div>
        `;
        document.getElementById('content').innerHTML = html;
      }

      renderCommunity() {
        const html = `
          <div class="card">
            <h1>Community Experiences 💬</h1>
            <p>Share and discover travel stories from our community</p>
            <button class="btn btn-primary" style="margin-top: 16px;">➕ Share Experience</button>
          </div>

          <div class="grid">
            ${[...Array(15)].map((_, i) => {
              const users = ['Ava', 'Noah', 'Mia', 'Lucas', 'Emma'];
              const user = users[i % users.length];
              const titles = ['Hidden gems in Tokyo', 'Paris street food', 'NYC views', 'Barcelona beaches', 'Singapore nightlife'];
              const title = titles[i % titles.length];
              return `
                <div class="post-card">
                  <div class="post-header">
                    <div class="post-avatar">${user.charAt(0)}</div>
                    <div>
                      <p class="post-author">${user} Wander</p>
                      <p class="post-time">2 days ago</p>
                    </div>
                  </div>
                  <p class="post-title">${title}</p>
                  <p class="post-text">Amazing experience discovering local culture and authentic cuisine. Would definitely recommend to fellow travelers!</p>
                  <div class="post-actions">
                    <span class="post-action">❤️ ${12 + i}</span>
                    <span class="post-action">💬 ${3 + (i % 5)}</span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
        document.getElementById('content').innerHTML = html;
      }

      renderProfile() {
        const html = `
          <div class="card">
            <h1>My Profile 👤</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px;">
              <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" value="${this.currentUser?.name}" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" value="${this.currentUser?.email}" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">City</label>
                <input type="text" value="${this.currentUser?.city || 'Not set'}" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">Country</label>
                <input type="text" value="${this.currentUser?.country || 'Not set'}" readonly>
              </div>
            </div>
            <div class="form-group mt-4">
              <label class="form-label">Bio</label>
              <textarea readonly style="height: 100px;">${this.currentUser?.info || 'No bio set'}</textarea>
            </div>
          </div>

          ${this.currentUser?.isAdmin ? `
            <div class="card" style="background: linear-gradient(135deg, rgba(255, 193, 7, 0.1), rgba(255, 152, 0, 0.1)); border: 2px solid rgba(255, 193, 7, 0.3);">
              <h2>👑 Administrator</h2>
              <p>You have full admin access to platform analytics and management tools.</p>
              <button class="btn btn-primary" onclick="app.route('/admin')">→ Admin Dashboard</button>
            </div>
          ` : ''}
        `;
        document.getElementById('content').innerHTML = html;
      }

      renderAdmin() {
        const html = `
          <div class="card highlight">
            <h1>📊 Admin Dashboard</h1>
            <p>Platform analytics and system management</p>
          </div>

          <div class="grid grid-3">
            <div class="stat-card">
              <div class="stat-number">${this.cities.length}</div>
              <div class="stat-label">Total Cities</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">7</div>
              <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">18+</div>
              <div class="stat-label">Community Posts</div>
            </div>
          </div>

          <div class="card">
            <h2>System Status</h2>
            <table>
              <tr><th>Component</th><th>Status</th><th>Details</th></tr>
              <tr><td>Database</td><td style="color: #4ade80;">✅ Online</td><td>SQLite3 - Operational</td></tr>
              <tr><td>API Server</td><td style="color: #4ade80;">✅ Running</td><td>Node.js/Express - 20+ endpoints</td></tr>
              <tr><td>Images</td><td style="color: #4ade80;">✅ Ready</td><td>378 cities with smart placeholders</td></tr>
              <tr><td>Auth</td><td style="color: #4ade80;">✅ Active</td><td>bcryptjs + Session Management</td></tr>
            </table>
          </div>
        `;
        document.getElementById('content').innerHTML = html;
      }

      filterCities() {
        const query = document.getElementById('city-search')?.value.toLowerCase() || '';
        const filtered = query ? this.cities.filter(c => c.name.toLowerCase().includes(query)) : this.cities;
        const grid = document.getElementById('city-grid');
        if (grid) {
          grid.innerHTML = filtered.slice(0, 60).map(city => `
            <div class="city-card" onclick="app.showCityDetails('${city.name}', '${city.country}', ${city.latitude}, ${city.longitude}, ${city.cost_index}, ${city.popularity})">
              <div class="city-image">
                <img src="${city.image}" alt="${city.name}" style="transition: transform 0.3s ease; cursor: pointer;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onerror="this.src='/api/image/placeholder/${city.name}'">
              </div>
              <div class="city-info">
                <div class="city-name">${city.name}</div>
                <div class="city-country">${city.country}</div>
                <div class="city-meta"><span>💵 $${city.cost_index}/day</span><span>⭐ ${city.popularity}%</span></div>
              </div>
            </div>
          `).join('');
        }
      }

      showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      async login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Login failed');

          this.currentUser = data.user;
          localStorage.setItem('currentUser', JSON.stringify(this.currentUser));
          await this.loadData();
          this.route('/');
          this.showToast('Welcome back! 👋', 'success');
        } catch (err) {
          this.showToast(err.message, 'error');
        }
      }

      async register() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Registration failed');

          this.showToast('Account created! Please log in', 'success');
          this.route('/login');
        } catch (err) {
          this.showToast(err.message, 'error');
        }
      }

      async logout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        this.currentUser = null;
        localStorage.removeItem('currentUser');
        this.route('/login');
      }
    }

    const app = new App();
  </script>
</body>
</html>
