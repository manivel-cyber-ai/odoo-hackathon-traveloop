{% extends 'base.html' %}
{% block title %}Delete Trip - Traveloop{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="card p-8 text-center">
    <div class="text-6xl text-red-400 mb-4"><i class="fas fa-exclamation-triangle"></i></div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Delete Trip?</h1>
    <p class="text-gray-500 mb-6">Are you sure you want to delete "<strong>{{ trip.name }}</strong>"? This cannot be undone.</p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit" class="btn-danger px-8">Yes, Delete</button>
      <a href="{% url 'trip_detail' trip.id %}" class="btn-secondary px-8">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
