{% extends 'base.html' %}
{% block title %}{{ action }} Trip - Traveloop{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">
    <i class="fas fa-{% if action == 'Create' %}plus{% else %}edit{% endif %} text-blue-600 mr-2"></i>{{ action }} Trip
  </h1>
  <div class="card p-6">
    <form method="post">
      {% csrf_token %}
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Trip Name *</label>
          <input type="text" name="name" value="{{ form.name.value|default:'' }}" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="e.g. Summer Europe Adventure">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
          <textarea name="description" rows="3"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="What's this trip about?">{{ form.description.value|default:'' }}</textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Start Date</label>
            <input type="date" name="start_date" value="{{ form.start_date.value|default:'' }}"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">End Date</label>
            <input type="date" name="end_date" value="{{ form.end_date.value|default:'' }}"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Budget Limit (USD)</label>
          <input type="number" name="budget_limit" value="{{ form.budget_limit.value|default:'' }}" step="0.01" min="0"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Optional budget cap">
        </div>
        <div class="flex items-center gap-3">
          <input type="checkbox" name="is_public" id="is_public" {% if form.is_public.value %}checked{% endif %}
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
          <label for="is_public" class="text-sm font-medium text-gray-700">Make this trip public (shareable link)</label>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn-primary px-8">
            <i class="fas fa-save mr-2"></i>{{ action }} Trip
          </button>
          {% if trip %}
          <a href="{% url 'trip_detail' trip.id %}" class="btn-secondary">Cancel</a>
          {% else %}
          <a href="{% url 'trip_list' %}" class="btn-secondary">Cancel</a>
          {% endif %}
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
