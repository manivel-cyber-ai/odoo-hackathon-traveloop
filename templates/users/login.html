{% extends 'base.html' %}
{% block title %}Login - Traveloop{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-600 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="text-5xl font-black text-blue-600 mb-2"><i class="fas fa-globe-americas"></i></div>
      <h1 class="text-3xl font-black text-gray-900">Traveloop</h1>
      <p class="text-gray-500 mt-1">Your intelligent travel planner</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" name="username" required
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Enter your username">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Enter your password">
        </div>
        {% if form.errors %}
        <p class="text-red-500 text-sm">Invalid credentials. Please try again.</p>
        {% endif %}
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors text-lg">
          Sign In <i class="fas fa-arrow-right ml-2"></i>
        </button>
      </div>
    </form>
    <p class="text-center text-gray-500 mt-6 text-sm">
      Don't have an account? <a href="{% url 'signup' %}" class="text-blue-600 font-semibold hover:underline">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
